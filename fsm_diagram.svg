<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="575">
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#222"/>
    </marker>
    <marker id="ah-ret" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1d4ed8"/>
    </marker>
    <marker id="ah-grey" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1060" height="575" fill="white" stroke="#d1d5db" stroke-width="1"/>

  <!-- Title -->
  <text x="530" y="28" text-anchor="middle" font-size="17" font-weight="bold"
        font-family="Arial, sans-serif" fill="#111">FSM Control Unit — State Diagram (Moore)</text>

  <!-- ===== STATES ===== -->

  <!-- S0: IDLE  (double ring = initial/accepting state) -->
  <circle cx="110" cy="170" r="52" fill="white"    stroke="#222" stroke-width="2"/>
  <circle cx="110" cy="170" r="45" fill="#dbeafe"  stroke="#222" stroke-width="2"/>
  <text x="110" y="165" text-anchor="middle" font-size="16" font-weight="bold"
        font-family="monospace" fill="#1e3a8a">S0</text>
  <text x="110" y="182" text-anchor="middle" font-size="11"
        font-family="Arial" fill="#1e3a8a">IDLE</text>
  <!-- done=1 label -->
  <text x="56"  y="170" text-anchor="end" font-size="10" font-family="monospace"
        fill="#16a34a">done=1</text>

  <!-- S1 -->
  <circle cx="300" cy="170" r="45" fill="#fef9c3" stroke="#222" stroke-width="2"/>
  <text x="300" y="175" text-anchor="middle" font-size="16" font-weight="bold"
        font-family="monospace">S1</text>

  <!-- S2 -->
  <circle cx="490" cy="170" r="45" fill="#fef9c3" stroke="#222" stroke-width="2"/>
  <text x="490" y="175" text-anchor="middle" font-size="16" font-weight="bold"
        font-family="monospace">S2</text>

  <!-- S3 -->
  <circle cx="680" cy="170" r="45" fill="#fef9c3" stroke="#222" stroke-width="2"/>
  <text x="680" y="175" text-anchor="middle" font-size="16" font-weight="bold"
        font-family="monospace">S3</text>

  <!-- S4 -->
  <circle cx="875" cy="170" r="45" fill="#fef9c3" stroke="#222" stroke-width="2"/>
  <text x="875" y="175" text-anchor="middle" font-size="16" font-weight="bold"
        font-family="monospace">S4</text>

  <!-- ===== RESET ARROW ===== -->
  <line x1="32" y1="100" x2="72" y2="133" stroke="#222" stroke-width="1.5"
        marker-end="url(#ah)"/>
  <text x="24" y="95" font-size="11" font-family="Arial" fill="#444">rst</text>

  <!-- ===== SELF-LOOP on S0 (opcode = 0 / NOP) ===== -->
  <path d="M 96,119  C 68,62 152,62 124,119"
        fill="none" stroke="#888" stroke-width="1.3" stroke-dasharray="4,3"
        marker-end="url(#ah-grey)"/>
  <text x="110" y="54" text-anchor="middle" font-size="9.5"
        font-family="Arial" fill="#666">opcode=0</text>

  <!-- ===== FORWARD TRANSITIONS ===== -->

  <!-- S0 → S1: all valid opcodes -->
  <line x1="162" y1="170" x2="248" y2="170" stroke="#222" stroke-width="1.8"
        marker-end="url(#ah)"/>
  <text x="205" y="156" text-anchor="middle" font-size="10" font-family="Arial">all opcodes</text>
  <text x="205" y="168" text-anchor="middle" font-size="10" font-family="Arial">(1–15)</text>

  <!-- S1 → S2: add / neg / sub / inc / dec / cp -->
  <line x1="345" y1="170" x2="438" y2="170" stroke="#222" stroke-width="1.8"
        marker-end="url(#ah)"/>
  <text x="391" y="153" text-anchor="middle" font-size="9.5" font-family="Arial">add, neg, sub</text>
  <text x="391" y="165" text-anchor="middle" font-size="9.5" font-family="Arial">inc, dec, cp</text>

  <!-- S2 → S3: add / sub / cp -->
  <line x1="535" y1="170" x2="628" y2="170" stroke="#222" stroke-width="1.8"
        marker-end="url(#ah)"/>
  <text x="581" y="155" text-anchor="middle" font-size="9.5" font-family="Arial">add, sub, cp</text>

  <!-- S3 → S4: sub -->
  <line x1="725" y1="170" x2="823" y2="170" stroke="#222" stroke-width="1.8"
        marker-end="url(#ah)"/>
  <text x="774" y="155" text-anchor="middle" font-size="10" font-family="Arial">sub</text>

  <!-- ===== RETURN ARCS (blue) back to S0 ===== -->

  <!-- S1 → S0 -->
  <path d="M 282,212  C 235,300 155,300 126,212"
        fill="none" stroke="#1d4ed8" stroke-width="1.6"
        marker-end="url(#ah-ret)"/>
  <text x="208" y="288" text-anchor="middle" font-size="9.5" font-family="Arial" fill="#1e40af">ldi, mov, jmp</text>
  <text x="208" y="301" text-anchor="middle" font-size="9.5" font-family="Arial" fill="#1e40af">brne, breq, brsh, brlo</text>
  <text x="208" y="314" text-anchor="middle" font-size="9.5" font-family="Arial" fill="#1e40af">lds, sts</text>

  <!-- S2 → S0 -->
  <path d="M 468,213  C 390,375 170,375 123,213"
        fill="none" stroke="#1d4ed8" stroke-width="1.6"
        marker-end="url(#ah-ret)"/>
  <text x="320" y="365" text-anchor="middle" font-size="10" font-family="Arial" fill="#1e40af">neg, inc, dec</text>

  <!-- S3 → S0 -->
  <path d="M 656,213  C 540,448 190,448 120,213"
        fill="none" stroke="#1d4ed8" stroke-width="1.6"
        marker-end="url(#ah-ret)"/>
  <text x="425" y="438" text-anchor="middle" font-size="10" font-family="Arial" fill="#1e40af">add, cp</text>

  <!-- S4 → S0 -->
  <path d="M 849,213  C 680,518 210,518 117,213"
        fill="none" stroke="#1d4ed8" stroke-width="1.6"
        marker-end="url(#ah-ret)"/>
  <text x="535" y="508" text-anchor="middle" font-size="10" font-family="Arial" fill="#1e40af">sub</text>

  <!-- ===== OPCODE TABLE ===== -->
  <!-- Header row -->
  <rect x="30" y="538" width="1000" height="20" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="80"  y="552" text-anchor="middle" font-size="11" font-weight="bold" font-family="Arial">Opcode</text>
  <text x="190" y="552" text-anchor="middle" font-size="11" font-weight="bold" font-family="Arial">Instruction</text>
  <text x="320" y="552" text-anchor="middle" font-size="11" font-weight="bold" font-family="Arial">State sequence</text>
  <text x="570" y="552" text-anchor="middle" font-size="11" font-weight="bold" font-family="Arial">Opcode</text>
  <text x="680" y="552" text-anchor="middle" font-size="11" font-weight="bold" font-family="Arial">Instruction</text>
  <text x="850" y="552" text-anchor="middle" font-size="11" font-weight="bold" font-family="Arial">State sequence</text>
  <!-- Data row -->
  <rect x="30" y="558" width="1000" height="16" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
  <text x="80"  y="570" text-anchor="middle" font-size="10" font-family="monospace">1-2,8-12,14-15</text>
  <text x="190" y="570" text-anchor="middle" font-size="10" font-family="monospace">ldi/mov/jmp/br*/lds/sts</text>
  <text x="320" y="570" text-anchor="middle" font-size="10" font-family="monospace">S0→S1→S0</text>
  <text x="570" y="570" text-anchor="middle" font-size="10" font-family="monospace">4,6,7</text>
  <text x="680" y="570" text-anchor="middle" font-size="10" font-family="monospace">neg/inc/dec</text>
  <text x="850" y="570" text-anchor="middle" font-size="10" font-family="monospace">S0→S1→S2→S0</text>

  <!-- Warning note -->
  <text x="30" y="530" font-size="9.5" font-family="Arial" fill="#92400e">
    Note: fsm_next.v labels opcode 6 as "in" but fsm_output.v labels it "inc" (uses alu_mode=5, increment) — likely a stale comment in fsm_next.v
  </text>
</svg>
