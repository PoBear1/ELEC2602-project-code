<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#1a1a2e"/></marker>
    <marker id="arrl" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto"><polygon points="8 0,0 3,8 6" fill="#1a1a2e"/></marker>
    <marker id="arrr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#c0392b"/></marker>
    <marker id="arrg" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#888"/></marker>
    <marker id="arrb" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#2e4053"/></marker>
  </defs>
  <style>
    .box { fill:#dce8fb; stroke:#2874a6; stroke-width:1.5; }
    .bl  { font-family:Arial,sans-serif; font-size:12px; font-weight:bold; text-anchor:middle; fill:#1a1a2e; }
    .sl  { font-family:Arial,sans-serif; font-size:9px;  text-anchor:middle; fill:#555; }
    .lbl { font-family:Arial,sans-serif; font-size:8.5px; fill:#333; }
    .ctl { font-family:Arial,sans-serif; font-size:8px;   fill:#c0392b; font-style:italic; }
    .d   { stroke:#1a1a2e; stroke-width:1.5; fill:none; marker-end:url(#arr); }
    .c   { stroke:#c0392b; stroke-width:1.1; fill:none; stroke-dasharray:5,3; marker-end:url(#arrr); }
    .ins { stroke:#2e4053; stroke-width:1.1; fill:none; stroke-dasharray:4,2; }
    .gry { stroke:#999;    stroke-width:1.2; fill:none; marker-end:url(#arrg); }
  </style>
  <rect width="1400" height="680" fill="white"/>

  <!-- Title -->
  <text x="700" y="14" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">16-bit Single-Bus Accumulator Processor</text>

  <!-- 16-bit Data Bus -->
  <rect x="14" y="22" width="1372" height="28" rx="4" fill="#fadbd8" stroke="#c0392b" stroke-width="2"/>
  <text x="700" y="41" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle" fill="#922b21">16-bit Data Bus</text>

  <!-- ═══ PC  x:22-108  y:80-170 ═══ -->
  <rect x="22" y="80" width="86" height="90" rx="3" class="box"/>
  <text x="65" y="108" class="bl">PC</text>
  <text x="65" y="122" class="sl">d_ff + add</text>
  <text x="65" y="135" class="sl">jmp? bus : +1</text>
  <text x="65" y="148" class="sl">out: pc_addr</text>
  <!-- bus → PC (jmp_offset) -->
  <line x1="46" y1="50" x2="46" y2="80" class="d"/>
  <text x="50" y="69" class="lbl">jmp_offset</text>
  <!-- pc_addr: exit PC bottom → grey routing wire → pmem addr port -->
  <!-- Routed at y=232 to stay below DEMUX at y=248 -->
  <line x1="65" y1="170" x2="65"  y2="232" class="gry" style="marker-end:none"/>
  <line x1="65" y1="232" x2="280" y2="232" class="gry" style="marker-end:none"/>
  <line x1="280" y1="232" x2="280" y2="172" class="gry"/>
  <text x="155" y="227" class="lbl" fill="#999">pc_addr [15:0]</text>

  <!-- ═══ Instruction Memory  x:200-360  y:70-172 ═══ -->
  <!-- pmem is far right of PC to give the tri_buf bus wire (x=168) clear space -->
  <rect x="200" y="70" width="160" height="102" rx="3" class="box"/>
  <text x="280" y="98"  class="bl">Instruction</text>
  <text x="280" y="112" class="bl">Memory</text>
  <text x="280" y="127" class="sl">pmem_block (ROM)</text>
  <text x="280" y="140" class="sl">$readmemb init</text>
  <text x="280" y="153" class="sl">32-bit words</text>
  <!-- opcode[31:16]: exit pmem right, turn down at x=390 (clear of RF at x=420) -->
  <line x1="360" y1="86" x2="390" y2="86" class="ins" style="marker-end:none"/>
  <line x1="390" y1="86" x2="390" y2="470" class="ins"/>
  <text x="362" y="80" class="lbl" fill="#2e4053">opcode [31:16]</text>
  <!-- imm [15:0]: pmem bottom → DEMUX top -->
  <line x1="280" y1="172" x2="280" y2="248" class="d"/>
  <text x="294" y="214" class="lbl">imm [15:0]</text>

  <!-- ═══ DEMUX  x:200-360  y:248-296 ═══ -->
  <rect x="200" y="248" width="160" height="48" rx="3" class="box"/>
  <text x="280" y="270" class="bl">DEMUX</text>
  <text x="280" y="284" class="sl">sel = dmem_bus_sel</text>
  <!-- path_0 (dmem_addr) → Data Memory: grey line at y=272 -->
  <line x1="360" y1="272" x2="1190" y2="272" class="gry" style="marker-end:none"/>
  <line x1="1190" y1="272" x2="1190" y2="172" class="gry"/>
  <text x="430" y="267" class="lbl" fill="#999">dmem_addr  (path_0, sel=0)  →  Data Memory address</text>
  <!-- path_1 → tri_buf -->
  <line x1="280" y1="296" x2="280" y2="326" class="d"/>
  <text x="294" y="315" class="lbl">path_1</text>

  <!-- ═══ tri_buf  x:200-360  y:326-368 ═══ -->
  <rect x="200" y="326" width="160" height="42" rx="3" class="box"/>
  <text x="280" y="347" class="bl">tri_buf</text>
  <text x="280" y="361" class="sl">en = imm_data_en</text>
  <!-- tri_buf → bus: exits left at x=168 (92px gap between PC right:108 and pmem left:200) -->
  <line x1="168" y1="326" x2="168" y2="50" class="d"/>

  <!-- ═══ Register File  x:420-580  y:70-172 ═══ -->
  <rect x="420" y="70" width="160" height="102" rx="3" class="box"/>
  <text x="500" y="98"  class="bl">Register</text>
  <text x="500" y="112" class="bl">File</text>
  <text x="500" y="127" class="sl">16 × 16-bit (R0–R15)</text>
  <text x="500" y="140" class="sl">reg_block</text>
  <text x="500" y="153" class="sl">tri_buf per register</text>
  <!-- r_out → bus -->
  <line x1="520" y1="70" x2="520" y2="50" class="d"/>
  <text x="524" y="65" class="lbl">r_out</text>
  <!-- bus → r_en (Din) -->
  <line x1="468" y1="50" x2="468" y2="70" class="d"/>
  <text x="422" y="65" class="lbl">r_en (Din)</text>

  <!-- ═══ A Register  x:618-718  y:84-164 ═══ -->
  <rect x="618" y="84" width="100" height="80" rx="3" class="box"/>
  <text x="668" y="112" class="bl">A Reg</text>
  <text x="668" y="127" class="sl">en = a_en</text>
  <text x="668" y="140" class="sl">tri always on</text>
  <text x="668" y="153" class="sl">out: alu_a</text>
  <!-- bus → A Reg -->
  <line x1="640" y1="50" x2="640" y2="84" class="d"/>
  <text x="644" y="69" class="lbl">a_en</text>
  <!-- A Reg → ALU (dedicated wire) -->
  <line x1="718" y1="120" x2="756" y2="120" class="d"/>
  <text x="724" y="114" class="lbl">alu_a</text>

  <!-- ═══ ALU  x:756-900  y:70-184 ═══ -->
  <rect x="756" y="70" width="144" height="114" rx="3" class="box"/>
  <text x="828" y="97"  class="bl">ALU</text>
  <text x="828" y="112" class="sl">a = alu_a</text>
  <text x="828" y="125" class="sl">b = data_bus</text>
  <text x="828" y="138" class="sl">add / neg / inc</text>
  <text x="828" y="151" class="sl">dec / adc / not</text>
  <text x="828" y="164" class="sl">mode = alu_mode</text>
  <!-- bus → ALU.b -->
  <line x1="776" y1="50" x2="776" y2="70" class="d"/>
  <text x="780" y="65" class="lbl">b</text>
  <!-- ALU → G Reg (alu_out) -->
  <line x1="900" y1="110" x2="940" y2="110" class="d"/>
  <text x="904" y="104" class="lbl">alu_out</text>
  <!-- ALU → Status (alu_stat):
       Exits ALU right at y=162, travels in the 15px gap (G_reg bottom=157, Status top=172),
       enters Status top at cx=992. White rect masks the G_reg box border. -->
  <line x1="900" y1="162" x2="992" y2="162" stroke="#1a1a2e" stroke-width="1.2" fill="none" style="marker-end:none"/>
  <line x1="992" y1="162" x2="992" y2="172" class="d" style="stroke-width:1.2"/>
  <rect x="901" y="150" width="72" height="14" fill="white"/>
  <text x="903" y="161" class="lbl">alu_stat [3:0]</text>

  <!-- ═══ G Register  x:940-1044  y:82-157 ═══ -->
  <rect x="940" y="82" width="104" height="75" rx="3" class="box"/>
  <text x="992" y="110" class="bl">G Reg</text>
  <text x="992" y="125" class="sl">g_en / g_out</text>
  <text x="992" y="138" class="sl">ALU result buf</text>
  <!-- G Reg → bus -->
  <line x1="966" y1="82" x2="966" y2="50" class="d"/>
  <text x="970" y="67" class="lbl">g_out</text>

  <!-- ═══ Status Register  x:940-1044  y:172-252 ═══ -->
  <rect x="940" y="172" width="104" height="80" rx="3" class="box"/>
  <text x="992" y="198" class="bl">Status</text>
  <text x="992" y="213" class="sl">[0]=Z  [1]=N</text>
  <text x="992" y="226" class="sl">[2]=C  [3]=V</text>
  <text x="992" y="239" class="sl">en = status_en</text>
  <!-- Status → ALU (prev_stat):
       Exits Status LEFT side at y=206. Travels in the gap (ALU right=900, G/Status left=940).
       Turns up at x=918, enters ALU right wall at y=182 (inside ALU bottom). -->
  <line x1="940" y1="206" x2="918" y2="206" stroke="#1a1a2e" stroke-width="1.2" fill="none" style="marker-end:none"/>
  <line x1="918" y1="206" x2="918" y2="182" stroke="#1a1a2e" stroke-width="1.2" fill="none" style="marker-end:none"/>
  <line x1="918" y1="182" x2="900" y2="182" class="d" style="stroke-width:1.2; marker-end:url(#arrl)"/>
  <!-- label in the open space below ALU, left of Status -->
  <text x="916" y="220" class="lbl" text-anchor="end">prev_stat</text>
  <!-- Status.q → FSM: exits right side, travels in lane at x=1074 -->
  <line x1="1044" y1="212" x2="1074" y2="212" class="ins" style="marker-end:none"/>
  <line x1="1074" y1="212" x2="1074" y2="470" class="ins"/>
  <text x="1078" y="348" class="lbl" fill="#2e4053">status [3:0]</text>

  <!-- ═══ Data Memory  x:1100-1280  y:70-172 ═══ -->
  <rect x="1100" y="70" width="180" height="102" rx="3" class="box"/>
  <text x="1190" y="98"  class="bl">Data</text>
  <text x="1190" y="112" class="bl">Memory</text>
  <text x="1190" y="127" class="sl">dmem (reg_block)</text>
  <text x="1190" y="140" class="sl">R/W via bus</text>
  <text x="1190" y="153" class="sl">addr = dmem_addr</text>
  <!-- dmem_out → bus -->
  <line x1="1214" y1="70" x2="1214" y2="50" class="d"/>
  <text x="1218" y="65" class="lbl">dmem_out</text>
  <!-- bus → dmem (dmem_en) -->
  <line x1="1158" y1="50" x2="1158" y2="70" class="d"/>
  <text x="1104" y="65" class="lbl">dmem_en</text>

  <!-- ═══ FSM Controller ═══ -->
  <rect x="14" y="470" width="1372" height="88" rx="4" fill="#d5f5e3" stroke="#1e8449" stroke-width="2"/>
  <text x="700" y="492" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle" fill="#1e8449">FSM Controller  (fsm_control)</text>
  <text x="700" y="508" font-family="Arial" font-size="9" text-anchor="middle" fill="#555">fsm_next (next-state logic)  ·  fsm_state_register (D flip-flop, state 0 = idle/fetch)  ·  fsm_output (combinational outputs)</text>
  <text x="700" y="522" font-family="Arial" font-size="9" text-anchor="middle" fill="#555">Inputs: opcode[15:12] (instruction type),  state[3:0],  status[3:0]</text>
  <text x="700" y="536" font-family="Arial" font-size="9" text-anchor="middle" fill="#555">Instructions:  0=ldi  1=mov  2=add  3=neg  4=sub  5=inc  6=dec  7=jmp  8=brne  9=breq  10=ld  11=st</text>
  <text x="700" y="550" font-family="Arial" font-size="8" text-anchor="middle" fill="#888">Outputs: r_en/r_out · a_en · g_en/g_out · alu_mode[3:0] · status_en · dmem_en/dmem_out · pc_en/jmp_en · dmem_bus_sel · imm_data_en</text>

  <!-- FSM control lines: labels removed where the component box already names the signal -->

  <!-- → PC: pc_en / jmp_en  (box text doesn't name these) -->
  <line x1="46"   y1="470" x2="46"   y2="170" class="c"/>
  <text x="50" y="177" class="ctl">pc_en, jmp_en</text>

  <!-- → DEMUX: dmem_bus_sel  (box says "sel = dmem_bus_sel" — no extra label needed) -->
  <line x1="258"  y1="470" x2="258"  y2="296" class="c"/>

  <!-- → tri_buf: imm_data_en  (box says "en = imm_data_en" — no extra label needed) -->
  <line x1="300"  y1="470" x2="300"  y2="368" class="c"/>

  <!-- → Register File: r_en, r_out (shown by bus arrows — no extra label) -->
  <line x1="500"  y1="470" x2="500"  y2="172" class="c"/>

  <!-- → A Reg: a_en  (box says "en = a_en" — no label) -->
  <line x1="656"  y1="470" x2="656"  y2="164" class="c"/>

  <!-- → ALU: alu_mode  (box says "mode = alu_mode" — no label) -->
  <line x1="848"  y1="470" x2="848"  y2="184" class="c"/>

  <!-- → G Reg: g_en, g_out  (box says "g_en / g_out" — no label) -->
  <line x1="1010" y1="470" x2="1010" y2="157" class="c"/>

  <!-- → Status: status_en  (box says "en = status_en" — no label) -->
  <line x1="1028" y1="470" x2="1028" y2="252" class="c"/>

  <!-- → Data Memory: dmem_en/dmem_out  (shown by bus arrows — no label) -->
  <line x1="1158" y1="470" x2="1158" y2="172" class="c"/>

  <!-- Opcode / status FSM input labels -->
  <text x="380" y="488" font-family="Arial" font-size="8.5" fill="#2e4053">← opcode [31:16]</text>
  <text x="1078" y="488" font-family="Arial" font-size="8.5" fill="#2e4053">← status [3:0]</text>

  <!-- clk / rst note -->
  <text x="18" y="578" font-family="Arial" font-size="10" fill="#666">clk, rst → all d_ff instances: PC, Register File, A Reg, G Reg, Status Reg, Data Memory, FSM state register</text>

  <!-- Legend -->
  <line x1="700" y1="598" x2="730" y2="598" stroke="#1a1a2e" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="734" y="602" font-family="Arial" font-size="9" fill="#1a1a2e">Data path</text>
  <line x1="820" y1="598" x2="850" y2="598" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrr)"/>
  <text x="854" y="602" font-family="Arial" font-size="9" fill="#c0392b">Control signal</text>
  <line x1="970" y1="598" x2="1000" y2="598" stroke="#2e4053" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="1004" y="602" font-family="Arial" font-size="9" fill="#2e4053">Instruction / status path</text>
  <line x1="1180" y1="598" x2="1210" y2="598" stroke="#999" stroke-width="1.2" marker-end="url(#arrg)"/>
  <text x="1214" y="602" font-family="Arial" font-size="9" fill="#999">Address / pc path</text>
</svg>
